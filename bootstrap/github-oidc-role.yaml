AWSTemplateFormatVersion: '2010-09-09'
Description: >
  One-time bootstrap: creates (or reuses) the GitHub OIDC provider and an IAM role
  that GitHub Actions assumes to deploy the Tripzyrate SAM stack. Deploy this ONCE,
  manually, before the GitHub Actions workflow can run.

Parameters:
  GitHubOrgAndRepo:
    Type: String
    Description: "Your GitHub org/user and repo, e.g. myusername/tripzyrate-api"

  CreateOidcProvider:
    Type: String
    AllowedValues: ["true", "false"]
    Default: "true"
    Description: >
      Set to "false" if your AWS account already has the GitHub OIDC provider
      (token.actions.githubusercontent.com) registered from a previous project.

Conditions:
  ShouldCreateProvider: !Equals [!Ref CreateOidcProvider, "true"]

Resources:

  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: ShouldCreateProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  GitHubDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: tripzyrate-github-deploy-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub "arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com"
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                "token.actions.githubusercontent.com:aud": "sts.amazonaws.com"
              StringLike:
                "token.actions.githubusercontent.com:sub": !Sub "repo:${GitHubOrgAndRepo}:ref:refs/heads/main"
      # NOTE: scoped broad enough to let SAM manage its own stack resources
      # (Lambda, API Gateway, DynamoDB, IAM, S3 for artifacts, CloudFormation).
      # Tighten further once your stack is stable if you want least-privilege.
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSCloudFormationFullAccess
        - arn:aws:iam::aws:policy/AmazonAPIGatewayAdministrator
        - arn:aws:iam::aws:policy/AWSLambda_FullAccess
        - arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/IAMFullAccess
        - arn:aws:iam::aws:policy/CloudFrontFullAccess

Outputs:
  RoleArn:
    Description: "Paste this into the GitHub repo secret AWS_DEPLOY_ROLE_ARN"
    Value: !GetAtt GitHubDeployRole.Arn
