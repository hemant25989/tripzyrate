AWSTemplateFormatVersion: '2010-09-09'
Description: Automated Edge SSL Provisioning for CloudFront Delivery

Resources:
  TripzyGlobalCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: tripzyrate.in
      ValidationMethod: DNS
      SubjectAlternativeNames:
        - "*.tripzyrate.in"
      DomainValidationOptions:
        # This tells AWS to look up your zone and insert the correct CNAME automatically
        - DomainName: tripzyrate.in
          HostedZoneId: Z00944631CIAK88XCKPME
        - DomainName: "*.tripzyrate.in"
          HostedZoneId: Z00944631CIAK88XCKPME

Outputs:
  CertificateArn:
    Value: !Ref TripzyGlobalCertificate
