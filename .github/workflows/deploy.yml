name: 100% Keyless Multi-Region Serverless Deployment

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy-infrastructure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2

      # -------------------------------------------------------------------------
      # STEP 1: AUTHENTICATE SECURELY VIA OIDC
      # -------------------------------------------------------------------------
      - name: Authenticate via OIDC (Keyless)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::540633651375:role/tripzyrate-github-deploy-role
          aws-region: ap-south-1
          audience: sts.amazonaws.com

      # -------------------------------------------------------------------------
      # STEP 2: PROVISION EDGE SSL CERTIFICATE (us-east-1)
      # -------------------------------------------------------------------------
      - name: Provision Automated SSL Certificate (N. Virginia)
        run: |
          aws cloudformation deploy \
            --template-file certificate-us-east-1.yaml \
            --stack-name tripzyrate-global-certificate \
            --region us-east-1

      # -------------------------------------------------------------------------
      # STEP 3: DEPLOY BACKEND MICROSERVICES STACK (ap-south-1)
      # -------------------------------------------------------------------------
      - name: SAM Build Production Application
        run: sam build

      - name: SAM Deploy Core Application (Mumbai Backend)
        run: |
          # Grabs the Certificate ARN generated completely on the fly in the previous step
          CERT_ARN=$(aws cloudformation describe-stacks --stack-name tripzyrate-global-certificate --region us-east-1 --query "Stacks[0].Outputs[?OutputKey=='CertificateArn'].OutputValue" --output text)
          
          sam deploy --no-confirm-changeset --no-fail-on-empty-changeset \
            --stack-name tripzyrate-production-stack \
            --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND \
            --region ap-south-1 \
            --parameter-overrides AcmCertificateArn=$CERT_ARN
