name: 100% Keyless Multi-Region Serverless Deployment

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy-infrastructure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2

      # -------------------------------------------------------------------------
      # STEP 1: AUTHENTICATE SECURELY VIA OIDC
      # -------------------------------------------------------------------------
      - name: Authenticate via OIDC (Keyless)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::540633651375:role/tripzyrate-github-deploy-role
          aws-region: ap-south-1
          audience: sts.amazonaws.com

      # -------------------------------------------------------------------------
      # STEP 2: PROVISION / FETCH EDGE SSL CERTIFICATE VIA AWS CLI
      # -------------------------------------------------------------------------
      - name: Request and Validate SSL Certificate (N. Virginia Edge)
        id: get-cert
        run: |
          echo "Checking for an existing certificate for tripzyrate.in..."
          
          # Tries to find an existing certificate ARN for your domain in us-east-1
          EXISTING_ARN=$(aws acm list-certificates --region us-east-1 --query "CertificateSummaryList[?DomainName=='tripzyrate.in'].CertificateArn" --output text)
          
          if [ -z "$EXISTING_ARN" ] || [ "$EXISTING_ARN" == "None" ]; then
            echo "No certificate found. Requesting a brand new one..."
            NEW_ARN=$(aws acm request-certificate \
              --domain-name tripzyrate.in \
              --validation-method DNS \
              --subject-alternative-names "*.tripzyrate.in" \
              --idempotency-token tripzyratemaincert \
              --region us-east-1 \
              --query "CertificateArn" --output text)
            
            echo "New Certificate Requested. ARN: $NEW_ARN"
            echo "CERT_ARN=$NEW_ARN" >> $GITHUB_OUTPUT
          else
            echo "Found existing certificate. ARN: $EXISTING_ARN"
            echo "CERT_ARN=$EXISTING_ARN" >> $GITHUB_OUTPUT
          fi

      # -------------------------------------------------------------------------
      # STEP 3: DEPLOY BACKEND MICROSERVICES STACK (ap-south-1 Mumbai)
      # -------------------------------------------------------------------------
      - name: SAM Build Production Application
        run: sam build

      - name: SAM Deploy Core Application (Mumbai Backend)
        run: |
          # Grabs the Certificate ARN set securely in Step 2
          CERT_ARN="${{ steps.get-cert.outputs.CERT_ARN }}"
          echo "Deploying production stack with Certificate ARN: $CERT_ARN"
          
          sam deploy --no-confirm-changeset --no-fail-on-empty-changeset \
            --stack-name tripzyrate-production-stack \
            --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND \
            --region ap-south-1 \
            --parameter-overrides AcmCertificateArn=$CERT_ARN
